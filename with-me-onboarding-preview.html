<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
  }

  .video-wrapper {
    position: relative;
    width: 100%;
    height: 100%; /* 🔥 ключ */
    overflow: hidden;
  }

  iframe {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 177.78%; /* замість vh */
    height: 100%;
    transform: translate(-50%, -50%);
    border: none;
  }

  @media (max-aspect-ratio: 16/9) {
    iframe {
      width: 100%;
      height: 56.25%;
    }
  }
</style>
</head>

<body>
  <div class="video-wrapper">
    <iframe 
      src="https://player.vimeo.com/video/1168486870?background=1&autoplay=1&loop=1&muted=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
