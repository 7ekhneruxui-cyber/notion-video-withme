<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  .wrapper {
    width: 100%;
    display: flex;
    justify-content: center;
  }

  iframe {
    width: 100%;
    max-width: 500px;
    aspect-ratio: 9 / 16;
    border: none;
    pointer-events: none;
    display: block;
  }
</style>
</head>

<body>
  <div class="wrapper">
    <iframe 
      src="https://player.vimeo.com/video/1168431588?background=1&muted=1&autoplay=1&loop=1">
    </iframe>
  </div>
</body>
</html>
