<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: white;
    }

    .wrapper {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .video-box {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="video-box">
      <iframe 
        src="https://player.vimeo.com/video/1168431588?background=1&autopause=0"
        allow="autoplay">
      </iframe>
    </div>
  </div>
</body>
</html>
