<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body {
    margin: 0;
    background: transparent;
  }

  .video-wrapper {
    width: 100%;
    aspect-ratio: 16 / 9;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    pointer-events: none;
  }
</style>
</head>

<body>
  <div class="video-wrapper">
    <iframe 
      src="https://player.vimeo.com/video/1168431588?background=1"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
